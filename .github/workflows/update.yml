name: Update ΑΣΕΠ Feed

on:
  # Τρέχει κάθε Δευτέρα στις 07:00 (ώρα Ελλάδας = UTC+3)
  schedule:
    - cron: '0 4 * * 1'

  # Επίσης μπορείς να το τρέξεις χειροκίνητα από το GitHub
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # Απαραίτητο για να κάνει commit το data.json

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: |
          pip install requests beautifulsoup4 feedparser

      - name: 🔍 Run scraper
        run: python scraper.py

      - name: 💾 Commit & Push data.json
        run: |
          git config --global user.name "ΑΣΕΠ Feed Bot"
          git config --global user.email "bot@asepfeed.gr"
          git add data.json
          git diff --staged --quiet || git commit -m "🔄 Update: $(date +'%d/%m/%Y %H:%M')"
          git push
